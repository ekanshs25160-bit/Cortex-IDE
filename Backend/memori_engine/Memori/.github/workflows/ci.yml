name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Run ruff linting
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

  security:
    name: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Run Bandit security checks
        run: uv run bandit -r memori -ll -ii

      - name: Run pip-audit for dependency vulnerabilities
        run: uv run pip-audit --require-hashes --disable-pip
        continue-on-error: true

  type-check:
    name: type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Run type checking with ty
        run: uvx ty check --exclude 'tests/llm/clients/**/*.py' --exclude 'tests/integration/**/*.py' --exclude 'tests/integration_v2/**/*.py' --exclude 'benchmarks/**/*.py' --exclude 'examples/**/*.py'

  test:
    name: test (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Run pytest with coverage
        run: uv run pytest --ignore=tests/benchmarks

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  merge-gate:
    name: merge-gate
    runs-on: ubuntu-latest
    needs: [lint, security, type-check, test]
    if: always()
    steps:
      - name: Check required jobs
        run: |
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "lint failed or did not complete: ${{ needs.lint.result }}"
            exit 1
          fi

          if [ "${{ needs.security.result }}" != "success" ]; then
            echo "security failed or did not complete: ${{ needs.security.result }}"
            exit 1
          fi

          if [ "${{ needs.type-check.result }}" != "success" ]; then
            echo "type-check failed or did not complete: ${{ needs.type-check.result }}"
            exit 1
          fi

          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "test failed or did not complete: ${{ needs.test.result }}"
            exit 1
          fi
